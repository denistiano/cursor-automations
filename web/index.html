<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Vibe Coders Academy — internal operations dashboard" />
    <title>Vibe Coders Academy HQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-layout" data-state="loading">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="sidebar-brand">
          <span class="logo" aria-hidden="true">VCA</span>
          <div>
            <strong>Vibe Coders Academy</strong>
            <span>Operations HQ</span>
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
          <a href="#home" data-route="home">Home</a>
          <a href="#tasks" data-route="tasks">Tasks</a>
          <a href="#documents" data-route="documents">Documents</a>
          <a href="#standups" data-route="standups">Standups</a>
          <a href="#careers" data-route="careers">Careers</a>
          <a href="#research" data-route="research">Research</a>
          <a href="#automations" data-route="automations">Automations</a>
        </nav>

        <footer class="sidebar-footer">
          <p id="syncStatus" class="sync-status">Loading…</p>
          <a href="https://github.com/denistiano/cursor-automations" target="_blank" rel="noreferrer">GitHub repo</a>
        </footer>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div class="topbar-title">
            <h1 id="pageTitle">Home</h1>
            <p id="pageSubtitle" class="page-subtitle"></p>
          </div>
          <div class="topbar-tools">
            <label class="search-field">
              <span class="visually-hidden">Search</span>
              <input id="searchInput" type="search" placeholder="Search tasks and documents…" autocomplete="off" />
            </label>
          </div>
        </header>

        <main id="main" class="main" aria-live="polite"></main>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
