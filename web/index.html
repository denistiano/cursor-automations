<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Vibe Coders Academy HQ — tasks, planning, research, and agent inbox" />
    <title>Vibe Coders Academy HQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <a class="brand" href="#home">
          <span class="brand-mark">VC</span>
          <span class="brand-text">
            <strong>Vibe Coders Academy</strong>
            <small>Course Business HQ</small>
          </span>
        </a>
        <nav class="sidebar-nav" id="sidebarNav" aria-label="Sections"></nav>
        <footer class="sidebar-footer">
          <p class="meta" id="generatedAt">Loading…</p>
        </footer>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <button class="icon-button sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle navigation">☰</button>
          <div class="search-wrap">
            <input id="searchInput" type="search" placeholder="Search inbox, tasks, research…" />
          </div>
          <div class="topbar-metrics" id="topbarMetrics"></div>
        </header>

        <main class="content" id="app">
          <section class="loading-state"><span class="loader"></span><p>Loading HQ…</p></section>
        </main>
      </div>
    </div>

    <template id="toastTemplate">
      <div class="toast" role="status">Copied</div>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
