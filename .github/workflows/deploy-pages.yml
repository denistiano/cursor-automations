name: Deploy GitHub Pages HQ

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "scripts/**"
      - "data/**"
      - "web/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "scripts/**"
      - "data/**"
      - "web/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static HQ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Export dashboard JSON from SQLite
        run: python3 scripts/build_site.py

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
