name: Office listings (Plovdiv)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and rank Plovdiv office listings
        run: |
          python3 scripts/fetch_office_listings.py
          python3 scripts/rank_office_listings.py
        continue-on-error: true

      - name: Commit updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/office-listings.json
          if git diff --staged --quiet; then
            echo "No listing changes"
            exit 0
          fi
          git commit -m "chore: refresh Plovdiv office listings under 800 EUR"
          git push
